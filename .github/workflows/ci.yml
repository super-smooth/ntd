name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-gomod2nix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - uses: cachix/install-nix-action@v31.8.2
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check and update gomod2nix.toml
      run: |
        # Generate fresh gomod2nix.toml
        nix develop --command gomod2nix generate
        
        # Check if there are changes
        if git diff --quiet gomod2nix.toml; then
          echo "✅ gomod2nix.toml is up to date!"
        else
          echo "📝 gomod2nix.toml was updated"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gomod2nix.toml
          git commit -m "chore: update gomod2nix.toml"
          git push
          echo "✅ gomod2nix.toml has been updated and committed"
        fi

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31.8.2
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check formatting
      run: |
        nix develop --command gofumpt -l .
    
    - name: Run golangci-lint
      run: |
        nix develop --command golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31.8.2
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Run tests
      run: |
        nix develop --command go test -v ./...

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31.8.2
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build with Nix
      run: |
        nix build .#packages.x86_64-linux.default
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ntd-x86_64-linux
        path: result/bin/ntd
